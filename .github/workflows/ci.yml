name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: gradle/actions/wrapper-validation@v3
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build debug app and unit tests
        run: ./gradlew --no-daemon testDebugUnitTest assembleDebug
      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android-Disassembler-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

  instrumentation:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        api-level: [30, 35]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: gradle/actions/wrapper-validation@v3
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run instrumentation UI flow tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          target: default
          profile: pixel_5
          script: ./gradlew --no-daemon connectedDebugAndroidTest
