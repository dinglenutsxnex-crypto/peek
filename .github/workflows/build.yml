name: Build Release APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Install host build tools
        run: sudo apt-get install -y bison

      - name: Install NDK + CMake
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "ndk;27.2.12479018" "cmake;3.22.1"

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.7"

      - name: Generate Gradle wrapper JAR
        run: gradle wrapper --gradle-version 8.7

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon
        env:
          ANDROID_NDK_HOME: $ANDROID_SDK_ROOT/ndk/27.2.12479018

      - uses: actions/upload-artifact@v4
        with:
          name: peek-release
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 30
